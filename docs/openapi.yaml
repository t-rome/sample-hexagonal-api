openapi: 3.0.3
info:
  title: API
  description: 'Product management REST API — DDD / Hexagonal Architecture'
  version: 1.0.0
servers:
  -
    url: 'http://localhost:8000'
    description: 'Local dev server'
tags:
  -
    name: System
    description: 'Health and operational endpoints'
  -
    name: Products
    description: 'Product CRUD operations'
  -
    name: Auth
    description: 'Registration and authentication'
  -
    name: Orders
    description: 'Order placement and retrieval'
security: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: 'Product with id "42" not found.'
    ValidationErrorResponse:
      type: object
      required:
        - error
        - violations
      properties:
        error:
          type: string
          example: 'Validation failed'
        violations:
          type: array
          items:
            type: object
            required:
              - field
              - message
            properties:
              field:
                type: string
                example: name
              message:
                type: string
                example: 'This value should not be blank.'
    LoginInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          example: secret123
    OrderInput:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderItemInput'
          example:
            -
              productId: 1
              quantity: 2
            -
              productId: 3
              quantity: 1
    OrderItemInput:
      type: object
      required:
        - productId
        - quantity
      properties:
        productId:
          type: integer
          example: 1
        quantity:
          type: integer
          minimum: 1
          example: 2
    OrderItemView:
      type: object
      properties:
        productId:
          type: integer
          example: 1
        quantity:
          type: integer
          example: 2
        unitPrice:
          type: number
          format: float
          example: 9.99
        totalPrice:
          type: number
          format: float
          example: 19.98
    OrderView:
      type: object
      properties:
        id:
          type: integer
          example: 1
        uuid:
          type: string
          format: uuid
          example: 019700ab-1234-7000-8000-000000000001
        userId:
          type: integer
          example: 1
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemView'
          example:
            -
              productId: 1
              quantity: 2
              unitPrice: 9.99
              totalPrice: 19.98
            -
              productId: 3
              quantity: 1
              unitPrice: 9.99
              totalPrice: 9.99
        totalPrice:
          type: number
          format: float
          example: 29.97
        status:
          type: string
          enum:
            - pending
            - confirmed
            - shipped
            - delivered
            - cancelled
          example: pending
        createdAt:
          type: string
          format: date-time
          example: '2026-05-03T10:00:00+00:00'
    ProductInput:
      type: object
      required:
        - name
        - price
      properties:
        name:
          type: string
          maxLength: 255
          example: Laptop
        description:
          type: string
          nullable: true
          example: 'A powerful laptop'
        price:
          type: number
          format: float
          minimum: 0
          example: 999.99
    ProductView:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Laptop
        description:
          type: string
          nullable: true
          example: 'A powerful laptop'
        price:
          type: number
          format: float
          example: 999.99
        createdAt:
          type: string
          format: date-time
          example: '2026-05-01T10:00:00+00:00'
    RegisterInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 8
          example: secret123
paths:
  /api/auth/login:
    post:
      tags:
        - Auth
      summary: 'Login and receive a JWT token'
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        200:
          description: 'JWT token'
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string, example: eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9... }
        401:
          description: 'Invalid credentials'
  /api/auth/logout:
    post:
      tags:
        - Auth
      summary: 'Invalidate the current JWT token'
      operationId: logout
      security:
        -
          bearerAuth: []
      responses:
        204:
          description: 'Token invalidated'
        401:
          description: Unauthorized
  /api/auth/register:
    post:
      tags:
        - Auth
      summary: 'Register a new user'
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
      responses:
        201:
          description: 'User registered successfully'
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
                  email: { type: string }
        409:
          description: 'Email already in use'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        422:
          description: 'Validation error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
  '/api/orders/{id}':
    get:
      tags:
        - Orders
      summary: 'Get an order by ID'
      operationId: getOrder
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: 'Order found'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderView'
        404:
          description: 'Order not found'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/orders:
    get:
      tags:
        - Orders
      summary: 'List all orders'
      operationId: listOrders
      responses:
        200:
          description: 'List of orders'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderView'
    post:
      tags:
        - Orders
      summary: 'Place a new order'
      operationId: placeOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderInput'
      responses:
        201:
          description: 'Order placed'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderView'
        404:
          description: 'Product not found'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        422:
          description: 'Validation error or business rule violation (e.g. insufficient stock)'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  '/api/orders/{id}/pay':
    patch:
      tags:
        - Orders
      summary: 'Pay an order'
      operationId: payOrder
      security:
        -
          bearerAuth: []
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: 'Payment accepted, order confirmed'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderView'
              example:
                id: 1
                uuid: 019700ab-1234-7000-8000-000000000001
                userId: 1
                items:
                  - { productId: 1, quantity: 2, unitPrice: 9.99, totalPrice: 19.98 }
                totalPrice: 19.98
                status: confirmed
                createdAt: '2026-05-03T10:00:00+00:00'
        401:
          description: Unauthorized
        402:
          description: 'Payment declined by the provider'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        404:
          description: 'Order not found'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        409:
          description: 'Order is not in a payable state'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/products:
    post:
      tags:
        - Products
      summary: 'Create a new product'
      operationId: createProduct
      security:
        -
          bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        201:
          description: 'Product created'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductView'
        401:
          description: Unauthorized
        422:
          description: 'Validation error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
    get:
      tags:
        - Products
      summary: 'List all products'
      operationId: listProducts
      responses:
        200:
          description: 'List of products'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductView'
  '/api/products/{id}':
    delete:
      tags:
        - Products
      summary: 'Delete a product'
      operationId: deleteProduct
      security:
        -
          bearerAuth: []
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        204:
          description: 'Product deleted'
        401:
          description: Unauthorized
        404:
          description: 'Product not found'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - Products
      summary: 'Get a product by ID'
      operationId: getProduct
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: 'Product found'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductView'
        404:
          description: 'Product not found'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Products
      summary: 'Update a product'
      operationId: updateProduct
      security:
        -
          bearerAuth: []
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        200:
          description: 'Product updated'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductView'
        401:
          description: Unauthorized
        404:
          description: 'Product not found'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        422:
          description: 'Validation error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
