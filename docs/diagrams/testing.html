  <!-- ⑥ OpenApiValidator -->
  <text x="893" y="133" font-size="11" font-weight="700" fill="#e2e8f0">⑥ OpenApiValidator — Flow</text>

  <rect x="892" y="139" width="490" height="162" rx="6" fill="#090f1e" stroke="#16a34a" stroke-width="1"/>
  <text x="900" y="155" font-size="8" fill="#64748b">assertMatchesOpenApiSpec(path, method, statusCode) — called after every HTTP request:</text>
  <text x="900" y="169" font-size="8" fill="#86efac">1. Yaml::parseFile('docs/openapi.yaml') → spec[]</text>
  <text x="900" y="181" font-size="8" fill="#4ade80">2. resolveResponseSchema(): spec['paths'][path][method]['responses'][status]</text>
  <text x="900" y="193" font-size="8" fill="#4ade80">3. resolveRefs(): $ref: '#/components/schemas/X' → resolved inline</text>
  <text x="900" y="205" font-size="8" fill="#4ade80">4. normalizeNullable(): nullable: true → type: [string, 'null']</text>
  <text x="900" y="217" font-size="8" fill="#4ade80">5. opis\JsonSchema\Validator::validate(Helper::toJSON(body), schema)</text>
  <line x1="900" y1="226" x2="1372" y2="226" stroke="#14532d" stroke-width="1"/>
  <text x="918" y="240" font-size="9" fill="#4ade80" font-weight="600">✓ isValid()</text>
  <text x="984" y="240" font-size="8" fill="#64748b">→ Test passed</text>
  <text x="918" y="254" font-size="9" fill="#f87171" font-weight="600">✗ !isValid()</text>
  <text x="984" y="254" font-size="8" fill="#64748b">→ AssertionFailedError with formatErrors() (incl. sub-errors)</text>
  <text x="900" y="270" font-size="7.5" fill="#334155">Skipped for: empty body (JsonException) · non-JSON response (e.g. 204 No Content)</text>
  <text x="900" y="282" font-size="7.5" fill="#334155">Used in: ProductControllerTest · OrderControllerTest · AuthControllerTest</text>

  <text x="900" y="349" font-size="8.5" fill="#38bdf8" font-weight="600">setUp() — before each test:</text>
  <text x="900" y="363" font-size="8" fill="#7dd3fc">  createClient() → KernelBrowser · getContainer()->get(EntityManagerInterface)</text>
  <text x="900" y="375" font-size="8" fill="#7dd3fc">  new OpenApiValidator('docs/openapi.yaml') · loadFixtures($this->fixtures())</text>
  <text x="900" y="391" font-size="8.5" fill="#38bdf8" font-weight="600">loadFixtures() — Database isolation:</text>
  <text x="900" y="405" font-size="8" fill="#7dd3fc">  SET session_replication_role = replica  ← FK constraints disabled</text>
  <text x="900" y="417" font-size="8" fill="#7dd3fc">  ORMExecutor(em, ORMPurger).execute(fixtures, append=false) → fresh seed</text>
  <text x="900" y="429" font-size="8" fill="#7dd3fc">  SET session_replication_role = DEFAULT</text>
  <text x="900" y="441" font-size="7.5" fill="#334155">Fixtures: UserFixture (Service, with Hasher) · ProductFixture · OrderFixture</text>

  <text x="900" y="499" font-size="8.5" fill="#38bdf8" font-weight="600">phpstan.neon:</text>
  <text x="900" y="513" font-size="8" fill="#7dd3fc" font-family="monospace">  level: 8  ·  paths: [src]  ·  excludePaths: [src/Kernel.php]</text>
