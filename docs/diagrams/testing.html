  <!-- ⑤ OpenApiValidator -->
  <text x="893" y="133" font-size="11" font-weight="700" fill="#e2e8f0">⑤ OpenApiValidator — Flow</text>

  <rect x="892" y="139" width="490" height="162" rx="6" fill="#090f1e" stroke="#16a34a" stroke-width="1"/>
  <text x="900" y="155" font-size="8" fill="#64748b">"the response matches the OpenAPI spec" — ApiContext calls OpenApiValidator per scenario step:</text>
  <text x="900" y="169" font-size="8" fill="#86efac">1. Yaml::parseFile('docs/openapi.yaml') → spec[]</text>
  <text x="900" y="181" font-size="8" fill="#4ade80">2. resolveSpecPath(): match request URL to spec path (handles {id} params)</text>
  <text x="900" y="193" font-size="8" fill="#4ade80">3. hasResponseSchema(): check if spec defines JSON schema for status → skip if not</text>
  <text x="900" y="205" font-size="8" fill="#4ade80">4. resolveRefs(): $ref: '#/components/schemas/X' → resolved inline</text>
  <text x="900" y="217" font-size="8" fill="#4ade80">5. normalizeNullable(): nullable: true → type: [T, 'null']  ·  opis/json-schema validate()</text>
  <line x1="900" y1="226" x2="1372" y2="226" stroke="#14532d" stroke-width="1"/>
  <text x="918" y="240" font-size="9" fill="#4ade80" font-weight="600">✓ isValid()</text>
  <text x="984" y="240" font-size="8" fill="#64748b">→ Behat step passed</text>
  <text x="918" y="254" font-size="9" fill="#f87171" font-weight="600">✗ !isValid()</text>
  <text x="984" y="254" font-size="8" fill="#64748b">→ RuntimeException with formatErrors() (incl. sub-errors)</text>
  <text x="900" y="270" font-size="7.5" fill="#334155">Skipped: JSON decode fails (no body) · spec has no schema defined for that status code</text>
  <text x="900" y="282" font-size="7.5" fill="#334155">Used in: Behat ApiContext — "And the response matches the OpenAPI spec" (all 3 feature files)</text>

  <!-- ⑥ Behat Database Isolation -->
  <line x1="892" y1="311" x2="1372" y2="311" stroke="#1e293b" stroke-width="1"/>
  <text x="893" y="327" font-size="11" font-weight="700" fill="#e2e8f0">⑥ Behat Database Isolation (DatabaseContext)</text>

  <rect x="892" y="333" width="490" height="118" rx="6" fill="#090f1e" stroke="#ca8a04" stroke-width="1"/>
  <text x="900" y="349" font-size="8.5" fill="#fbbf24" font-weight="600">resetDatabase() — BeforeScenario hook, runs before every scenario:</text>
  <text x="900" y="363" font-size="8" fill="#fde68a">  SET session_replication_role = replica  ← FK constraints disabled</text>
  <text x="900" y="375" font-size="8" fill="#fde68a">  ORMExecutor($em, ORMPurger).execute([]) → truncates all tables</text>
  <text x="900" y="387" font-size="8" fill="#fde68a">  SET session_replication_role = DEFAULT  ·  $em->clear()</text>
  <text x="900" y="403" font-size="8.5" fill="#fbbf24" font-weight="600">Entity creation via Gherkin Given steps (no fixture files):</text>
  <text x="900" y="417" font-size="8" fill="#fde68a">  aUserExistsWithEmailAndPassword() → UserRecord (hashed password via Hasher)</text>
  <text x="900" y="429" font-size="8" fill="#fde68a">  theFollowingProductsExist() → ProductRecord(s) from Gherkin table</text>
  <text x="900" y="441" font-size="7.5" fill="#334155">  anOrderExistsForTheProduct() → OrderRecord + OrderItemRecord via ORM</text>

  <!-- ⑦ PHPStan -->
  <line x1="892" y1="461" x2="1372" y2="461" stroke="#1e293b" stroke-width="1"/>
  <text x="893" y="477" font-size="11" font-weight="700" fill="#e2e8f0">⑦ PHPStan Configuration</text>

  <rect x="892" y="483" width="490" height="100" rx="6" fill="#090f1e" stroke="#0369a1" stroke-width="1"/>
  <text x="900" y="499" font-size="8.5" fill="#38bdf8" font-weight="600">phpstan.neon:</text>
  <text x="900" y="513" font-size="8" fill="#7dd3fc" font-family="monospace">  level: 8  ·  paths: [src]  ·  excludePaths: [src/Kernel.php]</text>
  <text x="900" y="525" font-size="8" fill="#7dd3fc" font-family="monospace">  symfony.containerXmlPath: var/cache/dev/…DebugContainer.xml</text>
  <text x="900" y="537" font-size="8" fill="#7dd3fc" font-family="monospace">  doctrine.objectManagerLoader: tests/orm.php</text>
  <text x="900" y="553" font-size="8.5" fill="#38bdf8" font-weight="600">Execution (composer app:analyse):</text>
  <text x="900" y="567" font-size="8" fill="#7dd3fc" font-family="monospace">  php -d memory_limit=512M vendor/bin/phpstan analyse</text>
  <text x="900" y="575" font-size="7.5" fill="#334155">  -d overrides php.ini (default 128M) · Vendor code is not analysed</text>

  <!-- ⑧ Behat Context Architecture -->
  <line x1="892" y1="593" x2="1372" y2="593" stroke="#1e293b" stroke-width="1"/>
  <text x="893" y="609" font-size="11" font-weight="700" fill="#e2e8f0">⑧ Behat Context Architecture</text>

  <rect x="892" y="615" width="490" height="120" rx="6" fill="#090f1e" stroke="#ca8a04" stroke-width="1"/>
  <text x="900" y="631" font-size="8.5" fill="#fbbf24" font-weight="600">KernelBoot — shared Symfony Kernel:</text>
  <text x="900" y="645" font-size="8" fill="#fde68a">  Kernel is booted once (static $kernel) · container() returns the service container</text>
