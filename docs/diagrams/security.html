  <!-- ④ ProductVoter -->
  <text x="893" y="133" font-size="11" font-weight="700" fill="#e2e8f0">④ ProductVoter</text>

  <rect x="892" y="139" width="490" height="188" rx="6" fill="#090f1e" stroke="#7c3aed" stroke-width="1"/>
  <text x="900" y="155" font-size="8.5" fill="#c4b5fd" font-weight="600">/** @extends Voter&lt;string, null&gt; */</text>
  <text x="900" y="167" font-size="8.5" fill="#c4b5fd" font-weight="600">final class ProductVoter extends Voter</text>
  <text x="900" y="183" font-size="8" fill="#a78bfa">  CREATE = 'product.create'  ·  UPDATE = 'product.update'  ·  DELETE = 'product.delete'</text>
  <line x1="900" y1="192" x2="1372" y2="192" stroke="#1e293b" stroke-width="1"/>
  <text x="900" y="206" font-size="8.5" fill="#c4b5fd" font-weight="600">supports(attribute, subject): bool</text>
  <text x="900" y="218" font-size="8" fill="#a78bfa">  → in_array($attribute, [CREATE, UPDATE, DELETE])</text>
  <line x1="900" y1="228" x2="1372" y2="228" stroke="#1e293b" stroke-width="1"/>
  <text x="900" y="242" font-size="8.5" fill="#c4b5fd" font-weight="600">voteOnAttribute(attribute, subject, token, vote): bool</text>
  <text x="900" y="254" font-size="8" fill="#a78bfa">  → $token-&gt;getUser() === null  → return false  (unauthenticated)</text>
  <text x="900" y="266" font-size="8" fill="#a78bfa">  → in_array('ROLE_ADMIN', $token-&gt;getRoleNames())  → bool</text>
  <line x1="900" y1="276" x2="1372" y2="276" stroke="#1e293b" stroke-width="1"/>
  <text x="900" y="289" font-size="8" fill="#64748b">Returns: ACCESS_GRANTED (1)  ·  ACCESS_DENIED (-1)  ·  ACCESS_ABSTAIN (0)</text>
  <text x="900" y="301" font-size="7.5" fill="#334155">Registered via Symfony autoconfigure → tagged security.voter · priority: default (0)</text>
  <text x="900" y="313" font-size="7.5" fill="#334155">Called by: denyAccessUnlessGranted() in ProductController (create, update, delete)</text>

  <!-- ⑤ security.yaml -->
  <line x1="892" y1="337" x2="1372" y2="337" stroke="#1e293b" stroke-width="1"/>
  <text x="893" y="353" font-size="11" font-weight="700" fill="#e2e8f0">⑤ security.yaml — Access Control</text>

  <rect x="892" y="359" width="490" height="170" rx="6" fill="#090f1e" stroke="#0369a1" stroke-width="1"/>
  <text x="900" y="375" font-size="8.5" fill="#38bdf8" font-weight="600">role_hierarchy:</text>
  <text x="900" y="387" font-size="8" fill="#7dd3fc" font-family="monospace">  ROLE_ADMIN: [ROLE_USER]   ← admin implies user (can also place orders)</text>
  <line x1="900" y1="397" x2="1372" y2="397" stroke="#1e293b" stroke-width="1"/>
  <text x="900" y="411" font-size="8.5" fill="#38bdf8" font-weight="600">access_control:  (evaluated top to bottom — first match wins)</text>
  <text x="900" y="425" font-size="8" fill="#7dd3fc" font-family="monospace">  ^/health         → PUBLIC_ACCESS</text>
  <text x="900" y="437" font-size="8" fill="#7dd3fc" font-family="monospace">  ^/api/auth       → PUBLIC_ACCESS</text>
  <text x="900" y="449" font-size="8" fill="#7dd3fc" font-family="monospace">  ^/api/products   → PUBLIC_ACCESS  (GET only)</text>
  <text x="900" y="461" font-size="8" fill="#7dd3fc" font-family="monospace">  ^/api/orders     → PUBLIC_ACCESS  (GET only)</text>
  <text x="900" y="473" font-size="8" fill="#7dd3fc" font-family="monospace">  ^/api            → IS_AUTHENTICATED_FULLY</text>
  <text x="900" y="489" font-size="7.5" fill="#334155">Voter called after access_control passes — for product writes, access_control lets</text>
  <text x="900" y="499" font-size="7.5" fill="#334155">IS_AUTHENTICATED_FULLY through, then ProductVoter enforces ROLE_ADMIN on top.</text>
  <text x="900" y="511" font-size="7.5" fill="#475569">Unauthenticated POST/PUT/DELETE → 401 (firewall entry point, before voter is reached)</text>
  <text x="900" y="521" font-size="7.5" fill="#475569">ROLE_USER POST/PUT/DELETE → 403 (passes firewall, voter returns ACCESS_DENIED)</text>

  <!-- ⑥ JWT Authentication -->
  <line x1="892" y1="539" x2="1372" y2="539" stroke="#1e293b" stroke-width="1"/>
  <text x="893" y="555" font-size="11" font-weight="700" fill="#e2e8f0">⑥ JWT Authentication Flow</text>

  <rect x="892" y="561" width="490" height="218" rx="6" fill="#090f1e" stroke="#ca8a04" stroke-width="1"/>
  <text x="900" y="577" font-size="8.5" fill="#fbbf24" font-weight="600">Login  (POST /api/auth/login)</text>
  <text x="900" y="589" font-size="8" fill="#fde68a">  json_login → UserRecord loaded by email → password verified</text>
  <text x="900" y="601" font-size="8" fill="#fde68a">  LexikJWT creates signed token with user.getRoles() in payload</text>
  <text x="900" y="613" font-size="8" fill="#fde68a">  Response: {"token": "&lt;signed-jwt&gt;"}</text>
  <line x1="900" y1="623" x2="1372" y2="623" stroke="#1e293b" stroke-width="1"/>
  <text x="900" y="637" font-size="8.5" fill="#fbbf24" font-weight="600">Authenticated requests</text>
  <text x="900" y="649" font-size="8" fill="#fde68a">  Authorization: Bearer &lt;token&gt;</text>
  <text x="900" y="661" font-size="8" fill="#fde68a">  JWTAuthenticator decodes token → loads UserRecord from DB</text>
  <text x="900" y="673" font-size="8" fill="#fde68a">  JWTPostAuthenticationToken($user, $fw, $user-&gt;getRoles())</text>
  <text x="900" y="685" font-size="8" fill="#fde68a">  token.getRoleNames() = ['ROLE_ADMIN', 'ROLE_USER'] or ['ROLE_USER']</text>
  <line x1="900" y1="695" x2="1372" y2="695" stroke="#1e293b" stroke-width="1"/>
  <text x="900" y="709" font-size="8.5" fill="#fbbf24" font-weight="600">Logout  (POST /api/auth/logout)</text>
  <text x="900" y="721" font-size="8" fill="#fde68a">  JWT id (jti claim) stored in Symfony cache (blocklist)</text>
  <text x="900" y="733" font-size="8" fill="#fde68a">  JwtBlocklistListener checks each request → 401 if blocklisted</text>
  <line x1="900" y1="743" x2="1372" y2="743" stroke="#1e293b" stroke-width="1"/>
  <text x="900" y="755" font-size="7.5" fill="#334155">Note: KernelBoot uses debug=false (App_KernelTestContainer). After adding new voters,</text>
  <text x="900" y="767" font-size="7.5" fill="#334155">run rm -rf var/cache/test — cache:clear --env=test only rebuilds the debug container.</text>
