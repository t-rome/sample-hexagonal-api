# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    App\Shared\Infrastructure\Console\OpenApiBuilder:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Shared\Infrastructure\Console\BuildOpenApiCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Shared\Infrastructure\Console\CheckOpenApiSyncCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Product\Domain\Repository\ProductRepositoryInterface:
        class: App\Product\Infrastructure\Persistence\ProductRepository

    App\User\Domain\Repository\UserRepositoryInterface:
        class: App\User\Infrastructure\Persistence\UserRepository

    App\Order\Domain\Repository\OrderRepositoryInterface:
        class: App\Order\Infrastructure\Persistence\OrderRepository

    App\Order\Domain\Port\PaymentGatewayInterface:
        class: App\Order\Infrastructure\Payment\FakePaymentGateway

    App\Shared\Domain\DomainEventPublisherInterface:
        class: App\Shared\Infrastructure\EventPublisher\SymfonyDomainEventPublisher

    App\Shared\Application\Bus\CommandBusInterface:
        class: App\Shared\Infrastructure\Bus\SymfonyCommandBus
        arguments:
            $locator: !service_locator
                App\Order\Application\Command\PlaceOrder\PlaceOrderCommand: '@App\Order\Application\Command\PlaceOrder\PlaceOrderHandler'
                App\Order\Application\Command\PayOrder\PayOrderCommand: '@App\Order\Application\Command\PayOrder\PayOrderHandler'
                App\Product\Application\Command\CreateProduct\CreateProductCommand: '@App\Product\Application\Command\CreateProduct\CreateProductHandler'
                App\Product\Application\Command\UpdateProduct\UpdateProductCommand: '@App\Product\Application\Command\UpdateProduct\UpdateProductHandler'
                App\Product\Application\Command\DeleteProduct\DeleteProductCommand: '@App\Product\Application\Command\DeleteProduct\DeleteProductHandler'
                App\User\Application\Command\RegisterUser\RegisterUserCommand: '@App\User\Application\Command\RegisterUser\RegisterUserHandler'

    App\Shared\Application\Bus\QueryBusInterface:
        class: App\Shared\Infrastructure\Bus\SymfonyQueryBus
        arguments:
            $locator: !service_locator
                App\Order\Application\Query\GetOrder\GetOrderQuery: '@App\Order\Application\Query\GetOrder\GetOrderHandler'
                App\Order\Application\Query\ListOrders\ListOrdersQuery: '@App\Order\Application\Query\ListOrders\ListOrdersHandler'
                App\Product\Application\Query\GetProduct\GetProductQuery: '@App\Product\Application\Query\GetProduct\GetProductHandler'
                App\Product\Application\Query\ListProducts\ListProductsQuery: '@App\Product\Application\Query\ListProducts\ListProductsHandler'

    App\User\Domain\Port\TokenRevocationInterface:
        class: App\User\Infrastructure\Security\JwtBlocklist

    App\User\Domain\Port\PasswordHasherInterface:
        class: App\User\Infrastructure\Security\SymfonyPasswordHasher

    App\Shared\Domain\NotificationServiceInterface:
        class: App\Shared\Infrastructure\Notification\FakeNotificationService

    App\Shared\Infrastructure\Http\ApiExceptionSubscriber:
        arguments:
            $mappers: !tagged_iterator app.exception_mapper
