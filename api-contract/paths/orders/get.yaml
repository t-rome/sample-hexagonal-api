/api/orders/{id}:
  get:
    tags: [Orders]
    summary: Get an order by ID
    operationId: getOrder
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: Order found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderView'
      '404':
        description: Order not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
