/api/orders/{id}/pay:
  patch:
    tags: [Orders]
    summary: Pay an order
    operationId: payOrder
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: Payment accepted, order confirmed
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderView'
            example:
              id: 1
              uuid: '019700ab-1234-7000-8000-000000000001'
              userId: 1
              items:
                - productId: 1
                  quantity: 2
                  unitPrice: 9.99
                  totalPrice: 19.98
              totalPrice: 19.98
              status: confirmed
              createdAt: '2026-05-03T10:00:00+00:00'
      '401':
        description: Unauthorized
      '402':
        description: Payment declined by the provider
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Order not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '409':
        description: Order is not in a payable state
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
