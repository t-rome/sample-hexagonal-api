ErrorResponse:
  type: object
  required: [error]
  properties:
    error:
      type: string
      example: Product with id "42" not found.

ValidationErrorResponse:
  type: object
  required: [error, violations]
  properties:
    error:
      type: string
      example: Validation failed
    violations:
      type: array
      items:
        type: object
        required: [field, message]
        properties:
          field:
            type: string
            example: name
          message:
            type: string
            example: This value should not be blank.
